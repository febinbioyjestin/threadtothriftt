# ADDED docker setup
version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: threadtothriftt-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: threadtothriftt-backend
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    image: nginx:alpine
    container_name: threadtothriftt-frontend
    ports:
      - "8080:80"
    volumes:
      - ./Frontend:/usr/share/nginx/html:ro
      - ./Frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mongo_data:
