# ADDED docker setup
version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: threadtothriftt-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: threadtothriftt-backend
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/threadtothriftt
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    image: nginx:alpine
    container_name: threadtothriftt-frontend
    ports:
      - "8080:80"
    volumes:
      - ./Frontend:/usr/share/nginx/html:ro
      - ./Frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mongo_data:
